<style>
:root{

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}

.logo svg{width:19px;height:19px;} .logo.big{width:64px;height:64px;border-radius:20px;} .logo.big svg{width:38px;height:38px;}
.brand h1{font-size:21px;font-weight:700;} .brand .sub{font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:1px;}

}
async function removeUsual(u){ usuals=usuals.filter(x=>x.id!==u.id); renderChips(); await sb.from("usuals").delete().eq("id",u.id); }
async function recordTrip(r){
  const d=new Date(),wd="日月火水木金土"[d.getDay()],ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  const trip={id:uid(),group_id:groupId,ym,date:(d.getMonth()+1)+"/"+d.getDate()+"（"+wd+"）",store:r.store,total:r.total,band:bandOf(r.total)};
  const { error } = await sb.from("trips").insert(trip);
  if(error){ toast("記録に失敗しました"); return; }
  if(r.items.length){ await sb.from("trip_items").insert(r.items.map(x=>({trip_id:trip.id,name:x.name,qty:x.qty,unit:x.unit,cat:x.cat||guessCat(x.name),price:x.price||0}))); }
  // auto-check matches
  const toCheck=curItems().filter(it=>!it.done && r.items.some(ri=>ri.name&&(it.name.indexOf(ri.name)>=0||ri.name.indexOf(it.name)>=0)));
  for(const it of toCheck){ it.done=true; await sb.from("list_items").update({done:true}).eq("id",it.id); }
  await reloadTrips(); render();
}

function itemNode(it){
  const el=document.createElement("div");el.className="item"+(it.done?" done":"")+(freshIds[it.id]?" enter":"");delete freshIds[it.id];el.style.borderLeftColor=cv(it.cat);
  const check='<button class="check"><svg viewBox="0 0 24 24"><path class="tick" d="M5 12.5l4.5 4.5L19 7"/></svg></button>';
  if(editingId===it.id){
    el.innerHTML=check+`<div class="iedit"><div class="er"><input class="ename" value="${esc(it.name)}"><input class="eqty" type="number" value="${it.qty}"><input class="eunit" value="${esc(it.unit)}" placeholder="単位"></div><div class="er"><span class="flg">メモ</span><input class="ememo" value="${esc(it.memo||"")}" placeholder="例：特売・○○ブランド"><button class="esave">保存</button></div></div><button class="del">✕</button>`;
    const ins=el.querySelectorAll(".iedit input");
    const save=()=>{const patch={name:ins[0].value.trim()||it.name,qty:Math.max(1,parseInt(ins[1].value,10)||1),unit:ins[2].value.trim(),memo:ins[3].value.trim()};patch.cat=guessCat(patch.name);editingId=null;patchItem(it,patch);};

    el.querySelector(".del").addEventListener("click",()=>{editingId=null;delItem(it);});
    setTimeout(()=>ins[0].focus(),30);return el;
  }
  const mid=`<div class="imid"><div class="iname">${esc(it.name)}</div>${it.memo?`<div class="imemo"><span class="mi">✎</span>${esc(it.memo)}</div>`:""}</div>`;
  let right;
  if(it.done){right=`<div class="iright">${qtyTag(it)?`<span class="qtytag">${qtyTag(it)}</span>`:""}</div>`;}
  else{right=`<div class="iright"><button class="star ${isUsual(it.name)?"on":""}">${isUsual(it.name)?"★":"☆"}</button><div class="stepper"><button class="sbtn minus" ${it.qty<=1?"disabled":""}>−</button><span class="sval">${sval(it)}</span><button class="sbtn plus">＋</button></div></div>`;}
  el.innerHTML=check+mid+right+'<button class="del">✕</button>';
  el.querySelector(".check").addEventListener("click",()=>{if(!it.done){el.classList.add("checking","done");setTimeout(()=>patchItem(it,{done:true}),300);}else patchItem(it,{done:false});});
  el.querySelector(".iname").addEventListener("click",()=>{editingId=it.id;render();});
  el.querySelector(".del").addEventListener("click",e=>{e.stopPropagation();el.classList.add("leaving");setTimeout(()=>delItem(it),220);});
  if(!it.done){
    el.querySelector(".minus").addEventListener("click",e=>{e.stopPropagation();if(it.qty>1)patchItem(it,{qty:it.qty-1});});
    el.querySelector(".plus").addEventListener("click",e=>{e.stopPropagation();patchItem(it,{qty:it.qty+1});});
    el.querySelector(".star").addEventListener("click",e=>{e.stopPropagation();toggleUsual(it);});
  }
  return el;
}

function fileToScaled(file){return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(url);let w=img.naturalWidth,h=img.naturalHeight;if(!w||!h){reject(new Error("size"));return;}const max=1568;if(Math.max(w,h)>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);const d=c.toDataURL("image/jpeg",0.85);resolve(d.split(",")[1]);};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("load"));};img.src=url;});}
async function onFile(file){let b64;try{b64=await fileToScaled(file);}catch(_){receiptError("画像を読み込めませんでした。別の写真でお試しください。");return;}
  scanning();
  try{
    const {data,error}=await sb.functions.invoke("read-receipt",{body:{image:b64}});
    if(error)throw error;
    if(data&&data.error)throw new Error(data.error);
    const items=((data&&data.items)||[]).map(x=>{const nm=((x&&x.name)||"").toString().trim();return {name:nm,qty:Number(x&&x.qty)||1,unit:((x&&x.unit)||"").toString().trim(),price:Number(x&&x.price)||0,cat:guessCat(nm)};}).filter(x=>x.name);
    const r={store:((data&&data.store)||"").toString().trim()||"店名不明",total:Number(data&&data.total)||0,items};
    if(!r.items.length&&!r.total){receiptError("レシートをうまく読み取れませんでした。明るい場所で、レシート全体がまっすぐ大きく写るように撮ると精度が上がります。");return;}
    renderResult(r);
  }catch(e){receiptError("読み取りに失敗しました。通信環境をご確認のうえ、もう一度お試しください。");}
}
function receiptError(msg){$rb().innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 22px;gap:14px;"><div style="width:52px;height:52px;border-radius:16px;background:#fbeee9;display:flex;align-items:center;justify-content:center;color:#db8574;font-size:28px;font-weight:700;">!</div><p style="font-size:13.5px;color:var(--ink-soft);line-height:1.75;max-width:300px;margin:0;">'+esc(msg)+'</p><button class="ghost" id="eback" style="margin-top:4px;">戻る</button></div>';document.getElementById("eback").addEventListener("click",receiptPick);}
function scanning(){$rb().innerHTML='<div class="scanwrap"><div class="rcpt"><div class="rl t"></div><div class="rl m"></div><div class="rl s"></div><div class="rl m"></div><div class="rl s"></div><div class="scanline"></div></div><div class="scantxt"><span class="spin"></span>AIがレシートを解析中…</div></div>';}
function sampleScan(i){scanning();setTimeout(()=>renderResult(RECEIPTS[i]),1200);}
function renderResult(r){
  const draft={store:r.store,total:r.total,items:r.items.map(x=>({name:x.name,qty:x.qty,unit:x.unit||"",price:x.price||0,cat:x.cat||guessCat(x.name)}))};
  $rb().innerHTML=`<div class="result"><div class="ehead"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>読み取れました。確認・修正してください</div><div class="efield"><label>買い物先</label><input id="eStore" class="einput" value="${esc(draft.store)}"></div><div class="efield"><label>合計金額</label><div class="etotalrow"><span class="yensign">¥</span><input id="eTotal" class="einput num" type="number" value="${draft.total}"><span class="bandpill" id="eBand"></span></div></div><div class="eitemshead"><span id="eCount">品目（${draft.items.length}）</span><span class="ematch" id="eMatch"></span></div><div id="eItems"></div><button class="eadd" id="eAdd">＋ 品目を追加</button><div class="rbtns" style="margin-top:16px"><button class="ghost" id="rback">戻る</button><button class="addall" id="rsave">この内容で記録する</button></div></div>`;
  const eItems=document.getElementById("eItems");
  const meta=()=>{const b=bandOf(draft.total);document.getElementById("eBand").innerHTML="¥".repeat(b)+' <span style="letter-spacing:0">'+BANDLABEL[b-1]+'</span>';let m=0;draft.items.forEach(ri=>{if(ri.name&&curItems().some(it=>!it.done&&(it.name.indexOf(ri.name)>=0||ri.name.indexOf(it.name)>=0)))m++;});document.getElementById("eMatch").textContent=m?"リストの"+m+"品と一致":"";document.getElementById("eCount").textContent="品目（"+draft.items.length+"）";};
  const rE=()=>{eItems.innerHTML="";draft.items.forEach((it,idx)=>{const row=document.createElement("div");row.className="eitem";row.innerHTML=`<div class="er1"><span class="cdot" style="background:${cv(it.cat||"other")}"></span><input class="einput iname" value="${esc(it.name)}"><button class="edel">✕</button></div><div class="er2"><span class="fl">数量</span><input class="einput iqty num" type="number" value="${it.qty}"><input class="einput iunit" value="${esc(it.unit)}" placeholder="単位"><span class="fl">¥</span><input class="einput iprice num" type="number" value="${it.price||""}" placeholder="金額"></div>`;const ins=row.querySelectorAll("input");ins[0].addEventListener("input",e=>{it.name=e.target.value;it.cat=guessCat(it.name);row.querySelector(".cdot").style.background=cv(it.cat);meta();});ins[1].addEventListener("input",e=>{it.qty=Math.max(1,parseInt(e.target.value,10)||1);});ins[2].addEventListener("input",e=>{it.unit=e.target.value;});ins[3].addEventListener("input",e=>{it.price=Math.max(0,parseInt(e.target.value,10)||0);});row.querySelector(".edel").addEventListener("click",()=>{draft.items.splice(idx,1);rE();meta();});eItems.appendChild(row);});};
  rE();meta();
  document.getElementById("eStore").addEventListener("input",e=>draft.store=e.target.value);
  document.getElementById("eTotal").addEventListener("input",e=>{draft.total=Math.max(0,parseInt(e.target.value,10)||0);meta();});
  document.getElementById("eAdd").addEventListener("click",()=>{draft.items.push({name:"",qty:1,unit:"",price:0,cat:"other"});rE();meta();});
  document.getElementById("rback").addEventListener("click",receiptPick);
  document.getElementById("rsave").addEventListener("click",async ()=>{draft.store=(draft.store||"").trim()||"店名不明";draft.items=draft.items.filter(x=>x.name.trim());await recordTrip(draft);closeAll();});
}

// history
function monthLabel(ym){const a=ym.split("-");return a[0]+"年"+(+a[1])+"月";}
function buildAgg(){const by={};trips.forEach(t=>{(by[t.ym]=by[t.ym]||[]).push(t);});return Object.keys(by).sort().reverse().map(ym=>{const ts=by[ym];const total=ts.reduce((a,t)=>a+t.total,0);const count=ts.length;const avg=Math.round(total/count);const sm={};ts.forEach(t=>sm[t.store]=(sm[t.store]||0)+t.total);const stores=Object.keys(sm).map(k=>({k,v:sm[k]})).sort((a,b)=>b.v-a.v);const maxStore=Math.max(...stores.map(s=>s.v),1);const cm={};ts.forEach(t=>(t.trip_items||[]).forEach(it=>{if(it.price>0)cm[it.cat]=(cm[it.cat]||0)+it.price;}));const cats=catOrder.filter(c=>cm[c]).map(c=>({k:c,v:cm[c]})).sort((a,b)=>b.v-a.v);const maxCat=Math.max(...cats.map(c=>c.v),1);const bc=[0,0,0,0];ts.forEach(t=>bc[t.band-1]++);const maxBand=Math.max(...bc,1);return{ym,total,count,avg,stores,maxStore,cats,maxCat,bandCount:bc,maxBand};});}
function renderHistory(){
  document.getElementById("htList").classList.toggle("on",histTab==="list");document.getElementById("htAgg").classList.toggle("on",histTab==="agg");
  const c=document.getElementById("histContent");
  if(histTab==="list"){const n=trips.length,sum=trips.reduce((a,t)=>a+t.total,0);c.innerHTML=`<div class="histsum"><div class="hcard"><div class="k">記録した回数</div><div class="val">${n}<small>回</small></div></div><div class="hcard"><div class="k">合計</div><div class="val">${yen(sum)}</div></div></div><div id="tripsBox"></div>`;const box=document.getElementById("tripsBox");if(!n){box.innerHTML='<div class="histempty">まだ記録がありません。<br>「レシート」から追加できます。</div>';return;}trips.forEach(t=>{const el=document.createElement("div");el.className="trip";const its=t.trip_items||[];el.innerHTML=`<div class="top"><span class="store">${esc(t.store)}</span><span class="total">${yen(t.total)}</span></div><div class="meta"><span class="bandpill">${"¥".repeat(t.band)}</span><span>${t.date}</span><span>・ ${its.length}品</span></div><div class="detail">${its.map(x=>`<span class="ti"><span class="cdot" style="background:${cv(x.cat)}"></span>${esc(x.name)}${x.price?" "+yen(x.price):""}</span>`).join("")}</div>`;el.addEventListener("click",()=>el.classList.toggle("open"));box.appendChild(el);});}
  else{const months=buildAgg();if(!months.length){c.innerHTML='<div class="histempty">まだ集計するデータがありません。</div>';return;}let html="";if(months.length>=2){const cur=months[0],prev=months[1];const diff=cur.total-prev.total;const pct=prev.total?Math.round(diff/prev.total*100):0;const up=diff>0;html+=`<div class="cmpcard"><div class="ct">${monthLabel(cur.ym)} は ${monthLabel(prev.ym)} より</div><div class="cbig ${up?"up":"down"}">${up?"▲":"▼"} ${yen(Math.abs(diff))}<span>(${up?"+":"−"}${Math.abs(pct)}%)</span></div><div class="cmprow"><span>${monthLabel(cur.ym)}</span><b>${yen(cur.total)}</b></div><div class="cmprow prev"><span>${monthLabel(prev.ym)}</span><b>${yen(prev.total)}</b></div></div>`;}else{html+='<div class="cmpnote">比較できる先月のデータがまだありません。</div>';}
  html+=months.map(mo=>`<div class="monthcard"><div class="monthhead"><span class="mtitle">${monthLabel(mo.ym)}</span><span class="mtotal">${yen(mo.total)}</span></div><div class="msub">${mo.count}回 ・ 平均 ${yen(mo.avg)}／回</div><div class="aggsec"><div class="st">カテゴリ別の支出内訳</div>${mo.cats.length?mo.cats.map(c2=>`<div class="barrow"><span class="bl">${CATS[c2.k].label}</span><span class="btrack"><span class="bfill" style="width:${Math.round(c2.v/mo.maxCat*100)}%;background:${cv(c2.k)}"></span></span><span class="bv">${yen(c2.v)}</span></div>`).join(""):'<div class="aggnote">品目の金額が未登録のため、内訳はまだありません。</div>'}</div><div class="aggsec"><div class="st">店別の合計</div>${mo.stores.map(s=>`<div class="barrow"><span class="bl">${esc(s.k)}</span><span class="btrack"><span class="bfill" style="width:${Math.round(s.v/mo.maxStore*100)}%"></span></span><span class="bv">${yen(s.v)}</span></div>`).join("")}</div></div>`).join("");
  c.innerHTML=html;}
}

boot();
</script>
